{% extends "base.html" %}
{% load static %}

{% block title %}문의 작성 — Voxliber{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/main/other/legal_pages.css' %}">{%  endblock %}

{% block content %}
<div class="contact-write-page">
  <div class="page-header">
    <h1>문의 작성</h1>
    <p>빠른 시간 내에 답변 드리겠습니다 (평일 기준 1~3일)</p>
  </div>

  {% if error %}
  <div class="form-error">{{ error }}</div>
  {% endif %}

  <div class="contact-form">
    <form method="post" action="{% url 'main:contact_write' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">이메일 <span style="color:var(--accent)">*</span></label>
        <input type="email" name="email" class="form-input" placeholder="답변 받으실 이메일" value="{% if request.user.is_authenticated %}{{ request.user.email }}{% endif %}" required>
      </div>
      <div class="form-group">
        <label class="form-label">제목 <span style="color:var(--accent)">*</span></label>
        <input type="text" name="subject" class="form-input" placeholder="문의 제목을 입력하세요" maxlength="200" required>
      </div>
      <div class="form-group">
        <label class="form-label">내용 <span style="color:var(--accent)">*</span></label>
        <textarea name="message" class="form-textarea" placeholder="문의 내용을 상세히 작성해주세요" required></textarea>
      </div>
      <div class="form-actions">
        <a href="{% url 'main:contact' %}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">문의 제출</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
