<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOXLIBER — 서버 준비 중</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d12;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8e2f4;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(100, 60, 200, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(60, 100, 200, 0.12) 0%, transparent 70%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #c4a8f0;
      margin-bottom: 3rem;
    }

    .icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2.4rem;
    }

    .icon-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(196, 168, 240, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: ring-pulse 2.8s ease-in-out infinite;
    }

    .icon-ring svg {
      opacity: 0.8;
    }

    .icon-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(196, 168, 240, 0.1);
      animation: ring-pulse 2.8s ease-in-out infinite 0.4s;
    }

    @keyframes ring-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0eaff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(232, 226, 244, 0.55);
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    .wave-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      height: 32px;
      margin-bottom: 2.8rem;
    }

    .wave-bars span {
      display: block;
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(to top, #7040d0, #c4a8f0);
      animation: wave-bar 1.2s ease-in-out infinite;
    }

    .wave-bars span:nth-child(1) { height: 40%; animation-delay: 0s; }
    .wave-bars span:nth-child(2) { height: 70%; animation-delay: 0.15s; }
    .wave-bars span:nth-child(3) { height: 100%; animation-delay: 0.3s; }
    .wave-bars span:nth-child(4) { height: 60%; animation-delay: 0.45s; }
    .wave-bars span:nth-child(5) { height: 80%; animation-delay: 0.6s; }
    .wave-bars span:nth-child(6) { height: 45%; animation-delay: 0.75s; }
    .wave-bars span:nth-child(7) { height: 90%; animation-delay: 0.9s; }

    @keyframes wave-bar {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: rgba(196, 168, 240, 0.65);
      border: 1px solid rgba(196, 168, 240, 0.18);
      border-radius: 100px;
      padding: 0.4rem 1rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7bc47b;
      animation: dot-blink 1.8s ease-in-out infinite;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">
    <div class="logo">VOXLIBER</div>

    <div class="icon-wrap">
      <div class="icon-ring">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c4a8f0" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </div>

    <div class="title">서버 준비 중입니다</div>
    <div class="subtitle">
      더 나은 오디오북 경험을 위해<br>
      열심히 준비하고 있어요.<br>
      잠시 후 다시 방문해 주세요.
    </div>

    <div class="wave-bars">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      서버 작업 진행 중
    </div>
  </div>
</body>
</html>
