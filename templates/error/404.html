{% extends "base.html" %}
{% load static %}

{% block title %}404 — 페이지를 찾을 수 없습니다 · Voxliber{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/error/404.css' %}">{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-title">페이지를 찾을 수 없어요</div>
  <div class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>URL을 다시 확인하거나 홈으로 돌아가보세요.</div>
  <div class="error-actions">
    <a href="{% url 'main:main' %}" class="btn-home">홈으로</a>
    <button onclick="history.back()" class="btn-back">이전 페이지</button>
  </div>
</div>
{% endblock %}
