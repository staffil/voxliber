{% extends "base.html" %}
{% load static %}

{% block title %}403 — 접근 권한 없음 · Voxliber{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/error/403.css' %}">{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">403</div>
  <div class="error-title">접근 권한이 없습니다</div>
  <div class="error-desc">이 페이지에 접근할 권한이 없습니다.<br>로그인 상태를 확인하거나 관리자에게 문의해주세요.</div>
  <div class="error-actions">
    <a href="{% url 'main:main' %}" class="btn-home">홈으로</a>
    <button onclick="history.back()" class="btn-back">이전 페이지</button>
  </div>
</div>
{% endblock %}
