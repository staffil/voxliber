{% extends "base.html" %}
{% load static %}

{% block title %}503 — 서비스 점검 중 · Voxliber{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/error/503.css' %}">{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">503</div>
  <div class="maintenance-badge">🔧 서비스 점검 중</div>
  <div class="error-title">잠시 후 돌아올게요</div>
  <div class="error-desc">더 나은 서비스를 위해 점검 중입니다.<br>불편을 드려 죄송합니다. 잠시 후 다시 방문해주세요.</div>
  <div class="error-actions">
    <button class="btn-retry" onclick="location.reload()">새로고침</button>
  </div>
</div>
{% endblock %}
