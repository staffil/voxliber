{% extends "base.html" %}
{% load static %}

{% block title %}408 — 요청 시간 초과 · Voxliber{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/error/408.css' %}">{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">408</div>
  <div class="error-title">요청 시간이 초과되었습니다</div>
  <div class="error-desc">서버 응답이 너무 오래 걸렸습니다.<br>네트워크 상태를 확인하고 다시 시도해주세요.</div>
  <div class="error-actions">
    <button class="btn-retry" onclick="location.reload()">다시 시도</button>
    <a href="{% url 'main:main' %}" class="btn-home">홈으로</a>
  </div>
</div>
{% endblock %}
